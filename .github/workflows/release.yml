name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force checkout main branch (IMPORTANT)
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Update manifest version
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          sudo apt-get update
          sudo apt-get install -y jq

          jq --arg version "$VERSION" \
            '.version = $version' \
            custom_components/knmi_seismisch/manifest.json > tmp.json

          mv tmp.json custom_components/knmi_seismisch/manifest.json

      - name: Commit and push changes (reliable way)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add custom_components/knmi_seismisch/manifest.json

          git commit -m "Bump manifest version to ${GITHUB_REF_NAME} [skip ci]" || echo "No changes to commit"

          git push origin main

      - name: Create ZIP
        run: |
          cd custom_components/knmi_seismisch
          zip -r knmi_seismisch.zip ./

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: custom_components/knmi_seismisch/knmi_seismisch.zip
